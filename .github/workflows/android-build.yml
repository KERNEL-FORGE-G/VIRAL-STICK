name: Android Build CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Type de build"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20.19.4"
  JAVA_VERSION: "21"
  # ── Environnement GitHub : "I_AM_ELON_MUSK" ──────────────────────
  # Secrets (environment-scoped, tous optionnels) :
  #   GEMINI_API_KEY
  #   DEEPSEEK_API_KEY
  #   MISTRAL_API_KEY
  #   ANDROID_KEYSTORE          (base64 du .keystore — optionnel, active le build release signé)
  #   ANDROID_KEYSTORE_PASSWORD
  #   ANDROID_KEY_ALIAS
  #   ANDROID_KEY_PASSWORD

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npx eslint src/ --ext .js,.jsx --max-warnings 0
        continue-on-error: true

  build-android:
    name: Build Android APK + AAB
    runs-on: ubuntu-latest
    environment: I_AM_ELON_MUSK
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json
      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Exposer JAVA_HOME à Gradle
        run: |
          echo "JAVA_HOME=${JAVA_HOME}" >> $GITHUB_ENV
          echo "ORG_GRADLE_JAVA_HOME=${JAVA_HOME}" >> $GITHUB_ENV
          java -version
      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: Vérifier les clés API
        run: |
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "✅ GEMINI_API_KEY configurée"
          else
            echo "⚠️ GEMINI_API_KEY manquante"
          fi
          if [ -n "${{ secrets.DEEPSEEK_API_KEY }}" ]; then
            echo "✅ DEEPSEEK_API_KEY configurée"
          fi
          if [ -n "${{ secrets.MISTRAL_API_KEY }}" ]; then
            echo "✅ MISTRAL_API_KEY configurée"
          fi

      - name: Check android/ exists
        id: check_android
        run: |
          if [ -d "android" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        working-directory: mobile

      - name: Cache Gradle
        if: steps.check_android.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            mobile/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Détecter keystore disponible
        id: keystore_check
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "✅ Keystore détecté — build release signé activé"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️ Keystore absent — build debug (non signé)"
          fi

      - name: Decode Keystore
        if: steps.check_android.outputs.exists == 'true' && steps.keystore_check.outputs.available == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/viral-stick.keystore
          echo "✅ Keystore décodé"
        working-directory: mobile

      - name: Build APK
        if: steps.check_android.outputs.exists == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ORG_GRADLE_JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          echo "🚀 Construction de l'APK Release"
          java -version
          ./gradlew --no-daemon assembleRelease
        working-directory: mobile/android

      - name: Build AAB
        if: steps.check_android.outputs.exists == 'true' && steps.keystore_check.outputs.available == 'true' && (github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main')
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ORG_GRADLE_JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          echo "📦 bundleRelease (signé)"
          java -version
          ./gradlew --no-daemon bundleRelease
        working-directory: mobile/android

      - name: Upload APK
        if: steps.check_android.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: viral-stick-apk-release
          path: mobile/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Upload AAB
        if: steps.check_android.outputs.exists == 'true' && steps.keystore_check.outputs.available == 'true' && (github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: viral-stick-aab-release
          path: mobile/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: warn

      - name: Notify completion
        run: echo "✅ Build terminé — APK et AAB disponibles dans les artefacts"

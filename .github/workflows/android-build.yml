name: Android Build CI

on:
  push:
    branches: [main, develop]
    paths:
      - "mobile/**"
      - ".github/workflows/android-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/**"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Type de build"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src/ --ext .js,.jsx --max-warnings 0
        continue-on-error: true

  build-android:
    name: Build Android APK + AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            mobile/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode Keystore
        if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/viral-stick.keystore
            echo "Keystore décodé avec succès"
          else
            echo "ANDROID_KEYSTORE non défini — build non signé"
          fi

      - name: Build APK
        run: |
          cd android
          if [ "${{ github.event.inputs.build_type }}" = "release" ] || [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Build AAB (Release only)
        if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: viral-stick-apk-${{ github.event.inputs.build_type || 'debug' }}
          path: mobile/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Upload AAB artifact
        if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: viral-stick-aab-release
          path: mobile/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: warn

      - name: Notify completion
        run: |
          echo "✅ Build terminé avec succès !"
          echo "📱 APK disponible dans les artefacts"
          if [ "${{ github.event.inputs.build_type }}" = "release" ] || [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "📦 AAB disponible dans les artefacts"
          fi
